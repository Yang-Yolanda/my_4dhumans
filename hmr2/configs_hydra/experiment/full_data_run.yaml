# @package _global_

# Standard Full Data Run Configuration for Paper 2 Phase 2
# Goal: 6-GPU Stable DDP Training on Full Mixed Dataset
# Backbone customizations are passed as ++ overrides in run_full_ddp.sh

defaults:
  - override /experiment: hmr_vit_transformer
  - override /paths: default

GENERAL:
  LOG_STEPS: 100
  VAL_STEPS: 1000
  CHECKPOINT_STEPS: 1000
  CHECKPOINT_SAVE_TOP_K: 3
  NUM_WORKERS: 4
  PREFETCH_FACTOR: 2

TRAIN:
  BATCH_SIZE: 256
  LR: 1e-5
  WEIGHT_DECAY: 1e-4
  GRAD_CLIP_VAL: 0.5
  ACCUMULATE_GRAD_BATCHES: 1

FREEZE_DEPTH: 8

trainer:
  max_epochs: 150
  devices: 6
  strategy: ddp
  precision: bf16-mixed
  log_every_n_steps: 100

DATASETS_CONFIG_FILE: datasets_tar.yaml

# Paths
paths:
  output_dir: ${oc.env:HOME}/NViT-master/outputs/phase2_full_run
